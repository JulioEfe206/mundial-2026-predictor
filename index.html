<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; color: white; padding: 20px; }
        .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 15px; border: 2px solid #00ffff; max-width: 400px; width: 100%; text-align: center; }
        .login-box h1 { color: #00ffff; margin-bottom: 30px; text-shadow: 0 0 20px rgba(0, 255, 255, 0.5); }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0, 0, 0, 0.3); border: 1px solid #00ffff; border-radius: 5px; color: white; font-size: 1em; }
        .login-box button { width: 100%; padding: 12px; margin-top: 10px; background: linear-gradient(135deg, #00ffff, #0080ff); border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; font-size: 1em; }
        .main-content { display: none; max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: #00ffff; text-shadow: 0 0 20px rgba(0, 255, 255, 0.5); margin-bottom: 20px; }
        .user-info { text-align: center; margin-bottom: 20px; padding: 10px; background: rgba(0, 255, 255, 0.1); border-radius: 10px; }
        .groups-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .group-card { background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(0, 255, 255, 0.3); border-radius: 10px; padding: 15px; }
        .group-title { text-align: center; color: #00ffff; font-size: 1.3em; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid rgba(0, 255, 255, 0.3); }
        .match { background: rgba(0, 0, 0, 0.3); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .match-header { font-size: 0.85em; color: #aaa; margin-bottom: 8px; }
        .match-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .team-name { flex: 1; text-align: center; font-weight: bold; font-size: 0.95em; }
        .vs { color: #00ffff; font-weight: bold; padding: 0 10px; }
        .prediction-buttons { display: flex; gap: 5px; }
        .pred-btn { flex: 1; padding: 8px; border: 2px solid rgba(0, 255, 255, 0.3); background: rgba(0, 0, 0, 0.3); color: white; border-radius: 5px; cursor: pointer; font-size: 0.85em; }
        .pred-btn:hover { background: rgba(0, 255, 255, 0.2); border-color: #00ffff; }
        .pred-btn.selected { background: rgba(0, 255, 100, 0.3); border-color: #00ff64; font-weight: bold; }
        .controls { text-align: center; margin-top: 30px; }
        .btn { padding: 12px 25px; margin: 5px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; color: white; font-size: 1em; }
        .btn-primary { background: #00ffff; color: #000; }
        .btn-admin { background: #ff8800; }
        .btn-danger { background: #ff4444; }
        .admin-panel { display: none; background: rgba(0,0,0,0.5); padding: 30px; margin-top: 30px; border-radius: 15px; border: 2px solid #ff8800; }
        .error-msg { color: #ff4444; margin-top: 10px; font-weight: bold; }
        @media (max-width: 768px) { .groups-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>🏆 WORLD CUP 2026</h1>
            <p style="margin-bottom: 20px; color: #aaa;">Group Stage Predictor</p>
            <input type="text" id="username" placeholder="Your Nickname">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()" id="loginBtn">Enter</button>
            <p id="errorMsg" class="error-msg" style="display: none;"></p>
        </div>
    </div>
    <div class="main-content" id="mainContent">
        <h1>🏆 WORLD CUP 2026 PREDICTOR</h1>
        <div class="user-info">Player: <strong id="currentUser"></strong></div>
        <div class="groups-container" id="groupsContainer"></div>
        <div class="controls">
            <button class="btn btn-primary" onclick="savePredictions()">💾 Save Predictions</button>
            <button class="btn btn-admin" onclick="toggleAdmin()">⚙️ Admin Panel</button>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
        <div class="admin-panel" id="adminPanel">
            <h2 style="color: #ff8800; text-align: center;">⚙️ ADMIN PANEL</h2>
            <div id="adminContent"></div>
        </div>
    </div>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbymSU5XKCaWdvwZQJxs2TO3wzhYmu00zZ0CruaBxozQ6dCGijGusqmS5GcZYk0l7RrJPA/exec';
        const PASSWORD = '1234';
        const ADMIN_PASSWORD = 'julio';
        
        let currentUser = null;
        let userPredictions = {};
        let realResults = {};

        const groups = {
            'A': { name: 'Group A', matches: [
                { date: 'Thu Jun 11 - 16:00h', home: 'Mexico', away: 'South Africa' },
                { date: 'Thu Jun 11 - 23:00h', home: 'South Korea', away: 'Czech Republic' },
                { date: 'Jun 18 - 13:00h', home: 'Czech Republic', away: 'South Africa' },
                { date: 'Jun 18 - 22:00h', home: 'Mexico', away: 'South Korea' },
                { date: 'Jun 24 - 22:00h', home: 'South Africa', away: 'South Korea' },
                { date: 'Jun 24 - 22:00h', home: 'Czech Republic', away: 'Mexico' }
            ]},
            'B': { name: 'Group B', matches: [
                { date: 'Fri Jun 12 - 16:00h', home: 'Canada', away: 'Qatar' },
                { date: 'Jun 13 - 16:00h', home: 'Switzerland', away: 'Bosnia & Herzegovina' },
                { date: 'Jun 18 - 16:00h', home: 'Switzerland', away: 'Bosnia & Herzegovina' },
                { date: 'Jun 18 - 19:00h', home: 'Canada', away: 'Qatar' },
                { date: 'Jun 24 - 16:00h', home: 'Bosnia & Herzegovina', away: 'Qatar' },
                { date: 'Jun 24 - 16:00h', home: 'Switzerland', away: 'Canada' }
            ]},
            'C': { name: 'Group C', matches: [
                { date: 'Sat Jun 13 - 19:00h', home: 'Brazil', away: 'Morocco' },
                { date: 'Sat Jun 13 - 22:00h', home: 'Haiti', away: 'Scotland' },
                { date: 'Jun 19 - 19:00h', home: 'Scotland', away: 'Morocco' },
                { date: 'Jun 19 - 22:00h', home: 'Brazil', away: 'Haiti' },
                { date: 'Jun 24 - 19:00h', home: 'Scotland', away: 'Brazil' },
                { date: 'Jun 24 - 19:00h', home: 'Morocco', away: 'Haiti' }
            ]},
            'D': { name: 'Group D', matches: [
                { date: 'Fri Jun 12 - 22:00h', home: 'USA', away: 'Paraguay' },
                { date: 'Jun 14 - 01:00h', home: 'Australia', away: 'Turkey' },
                { date: 'Jun 19 - 16:00h', home: 'USA', away: 'Australia' },
                { date: 'Jun 20 - 00:00h', home: 'Turkey', away: 'Paraguay' },
                { date: 'Jun 25 - 23:00h', home: 'Paraguay', away: 'Australia' },
                { date: 'Jun 25 - 23:00h', home: 'Turkey', away: 'USA' }
            ]},
            'E': { name: 'Group E', matches: [
                { date: 'Sun Jun 14 - 14:00h', home: 'Germany', away: 'Ecuador' },
                { date: 'Sun Jun 14 - 20:00h', home: 'Ivory Coast', away: 'Curacao' },
                { date: 'Jun 20 - 17:00h', home: 'Germany', away: 'Ivory Coast' },
                { date: 'Jun 20 - 21:00h', home: 'Ecuador', away: 'Curacao' },
                { date: 'Jun 25 - 17:00h', home: 'Curacao', away: 'Ivory Coast' },
                { date: 'Jun 25 - 17:00h', home: 'Ecuador', away: 'Germany' }
            ]},
            'F': { name: 'Group F', matches: [
                { date: 'Sun Jun 14 - 17:00h', home: 'Netherlands', away: 'Japan' },
                { date: 'Sun Jun 14 - 23:00h', home: 'Sweden', away: 'Tunisia' },
                { date: 'Jun 20 - 14:00h', home: 'Netherlands', away: 'Sweden' },
                { date: 'Jun 21 - 01:00h', home: 'Tunisia', away: 'Japan' },
                { date: 'Jun 25 - 20:00h', home: 'Japan', away: 'Sweden' },
                { date: 'Jun 25 - 20:00h', home: 'Tunisia', away: 'Netherlands' }
            ]},
            'G': { name: 'Group G', matches: [
                { date: 'Mon Jun 15 - 16:00h', home: 'Belgium', away: 'Egypt' },
                { date: 'Mon Jun 15 - 22:00h', home: 'Iran', away: 'New Zealand' },
                { date: 'Jun 21 - 16:00h', home: 'Belgium', away: 'Iran' },
                { date: 'Jun 21 - 22:00h', home: 'New Zealand', away: 'Egypt' },
                { date: 'Jun 27 - 00:00h', home: 'New Zealand', away: 'Belgium' },
                { date: 'Jun 27 - 00:00h', home: 'Egypt', away: 'Iran' }
            ]},
            'H': { name: 'Group H', matches: [
                { date: 'Mon Jun 15 - 13:00h', home: 'Spain', away: 'Cape Verde' },
                { date: 'Mon Jun 15 - 19:00h', home: 'Saudi Arabia', away: 'Uruguay' },
                { date: 'Jun 21 - 13:00h', home: 'Spain', away: 'Saudi Arabia' },
                { date: 'Jun 21 - 19:00h', home: 'Uruguay', away: 'Cape Verde' },
                { date: 'Jun 26 - 21:00h', home: 'Cape Verde', away: 'Saudi Arabia' },
                { date: 'Jun 26 - 21:00h', home: 'Uruguay', away: 'Spain' }
            ]},
            'I': { name: 'Group I', matches: [
                { date: 'Tue Jun 16 - 16:00h', home: 'France', away: 'Senegal' },
                { date: 'Tue Jun 16 - 19:00h', home: 'Iraq', away: 'Norway' },
                { date: 'Jun 22 - 18:00h', home: 'France', away: 'Iraq' },
                { date: 'Jun 22 - 21:00h', home: 'Norway', away: 'Senegal' },
                { date: 'Jun 26 - 16:00h', home: 'Senegal', away: 'Iraq' },
                { date: 'Jun 26 - 16:00h', home: 'Norway', away: 'France' }
            ]},
            'J': { name: 'Group J', matches: [
                { date: 'Tue Jun 16 - 22:00h', home: 'Argentina', away: 'Algeria' },
                { date: 'Jun 17 - 01:00h', home: 'Austria', away: 'Jordan' },
                { date: 'Jun 22 - 14:00h', home: 'Argentina', away: 'Austria' },
                { date: 'Jun 23 - 00:00h', home: 'Jordan', away: 'Algeria' },
                { date: 'Jun 27 - 23:00h', home: 'Algeria', away: 'Austria' },
                { date: 'Jun 27 - 23:00h', home: 'Jordan', away: 'Argentina' }
            ]},
            'K': { name: 'Group K', matches: [
                { date: 'Wed Jun 17 - 14:00h', home: 'Portugal', away: 'DR Congo' },
                { date: 'Wed Jun 17 - 23:00h', home: 'Uzbekistan', away: 'Colombia' },
                { date: 'Jun 23 - 14:00h', home: 'Portugal', away: 'Uzbekistan' },
                { date: 'Jun 23 - 23:00h', home: 'Colombia', away: 'DR Congo' },
                { date: 'Jun 27 - 20:30h', home: 'DR Congo', away: 'Uzbekistan' },
                { date: 'Jun 27 - 20:30h', home: 'Colombia', away: 'Portugal' }
            ]},
            'L': { name: 'Group L', matches: [
                { date: 'Wed Jun 17 - 17:00h', home: 'England', away: 'Croatia' },
                { date: 'Wed Jun 17 - 20:00h', home: 'Ghana', away: 'Panama' },
                { date: 'Jun 23 - 17:00h', home: 'England', away: 'Ghana' },
                { date: 'Jun 23 - 20:00h', home: 'Panama', away: 'Croatia' },
                { date: 'Jun 27 - 18:00h', home: 'Croatia', away: 'Ghana' },
                { date: 'Jun 27 - 18:00h', home: 'Panama', away: 'England' }
            ]}
        };

        async function apiCall(action, data = null) {
            try {
                if (data) {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: action, ...data })
                    });
                    return { success: true };
                } else {
                    const response = await fetch(SCRIPT_URL + '?action=' + action);
                    return await response.json();
                }
            } catch (error) {
                console.error('API Error:', error);
                return { success: false, error: error.message };
            }
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');

            if (!username) { errorEl.textContent = "Please enter nickname"; errorEl.style.display = 'block'; return; }
            if (password !== PASSWORD && password !== ADMIN_PASSWORD) { errorEl.textContent = "Wrong password"; errorEl.style.display = 'block'; return; }

            if (password === PASSWORD) {
                const result = await apiCall('getUsers');
                if (result.success && result.users.map(u => u.toLowerCase()).includes(username.toLowerCase())) {
                    errorEl.textContent = "Nickname already taken - use another one";
                    errorEl.style.display = 'block';
                    return;
                }
                await apiCall('registerUser', { username: username });
                userPredictions = {};
            }

            currentUser = username;
            document.getElementById('currentUser').textContent = username;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            
            await loadRealResults();
            renderGroups();
        }

        async function loadRealResults() {
            const result = await apiCall('getResults');
            if (result.success) realResults = result.results;
        }

        function logout() { location.reload(); }

        function renderGroups() {
            const container = document.getElementById('groupsContainer');
            container.innerHTML = '';
            for (const [groupKey, group] of Object.entries(groups)) {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'group-card';
                const title = document.createElement('div');
                title.className = 'group-title';
                title.textContent = group.name;
                groupDiv.appendChild(title);

                group.matches.forEach((match, matchIdx) => {
                    const matchKey = `${groupKey}-${matchIdx}`;
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'match';
                    matchDiv.innerHTML = `<div class="match-header">${match.date}</div>
                        <div class="match-teams"><div class="team-name">${match.home}</div><div class="vs">VS</div><div class="team-name">${match.away}</div></div>`;
                    
                    const buttons = document.createElement('div');
                    buttons.className = 'prediction-buttons';
                    
                    ['home', 'draw', 'away'].forEach(type => {
                        const btn = document.createElement('button');
                        btn.className = 'pred-btn';
                        btn.textContent = type === 'draw' ? 'Draw' : (type === 'home' ? match.home : match.away);
                        if (userPredictions[matchKey] === type) btn.classList.add('selected');
                        btn.onclick = () => {
                            if (!realResults[matchKey]) {
                                userPredictions[matchKey] = type;
                                renderGroups();
                            }
                        };
                        buttons.appendChild(btn);
                    });
                    
                    matchDiv.appendChild(buttons);
                    groupDiv.appendChild(matchDiv);
                });
                container.appendChild(groupDiv);
            }
        }

        async function savePredictions() {
            if (!currentUser) return;
            const result = await apiCall('savePredictions', { username: currentUser, predictions: userPredictions });
            alert(result.success ? '✅ Saved!' : '❌ Error: ' + result.error);
        }

        async function toggleAdmin() {
            const pass = prompt('Admin password:');
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
